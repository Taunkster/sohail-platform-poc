name: Sohail Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Spin up a real PostgreSQL instance for RLS testing
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sohail_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Configure Test Environment
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/sohail_test_db" >> .env.test
          echo "JWT_SECRET=super_secure_test_key_rotation_2026" >> .env.test
          echo "NODE_ENV=test" >> .env.test

      - name: Run Database Migrations & E2E Security Tests
        run: |
          npm run db:test:reset
          npm run test:e2e
