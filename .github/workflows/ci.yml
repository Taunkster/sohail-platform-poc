name: Sohail Platform CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sohail_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Configure Test Environment
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/sohail_test_db" >> .env.test
          echo "JWT_SECRET=super_secure_test_key_rotation_2026" >> .env.test
          echo "NODE_ENV=test" >> .env.test

      - name: Run Database Migrations & E2E Security Tests
        run: |
          npm run db:test:reset || npx typeorm migration:run -- -d dist/data-source.js
          npm run test:e2e

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && needs.build-and-test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
          -H "Content-Type: application/json"