services:
  db:
    image: postgres:15-alpine
    container_name: sohail-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: sohail_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sohail_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sohail-api
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/sohail_db
      JWT_SECRET: super_secure_dev_key_2026
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx typeorm migration:run -d dist/src/data-source.js && node dist/src/main.js"
    # Orchestrator-level health checking targeting our new hardened endpoint
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pgdata: